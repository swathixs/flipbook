<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: transparent; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      overflow: hidden;
    }
    #loading {
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      position: absolute;
    }
    .flip-book { 
      display: none;
    }
    .page {
      background: white;
    }
    .page img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>
  <div id="flipbook" class="flip-book"></div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

  <script>
    const singlePages = ['cover.jpg', 'endcover.jpg'];
    
    const images = [
      'cover.jpg', 'index.jpg',
      'page1.jpg', 'page2.jpg', 'page3.jpg', 'page4.jpg', 'page5.jpg',
      'page6.jpg', 'page7.jpg', 'page8.jpg', 'page9.jpg', 'page10.jpg',
      'page11.jpg', 'appendix.jpg', 'endcover.jpg'
    ];

    const container = document.getElementById('flipbook');

    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
    }

    async function init() {
      const SINGLE_W = 960;
      const SINGLE_H = 1285;

      const scale = Math.min(
        (window.innerWidth * 0.9) / (SINGLE_W * 2),
        (window.innerHeight * 0.9) / SINGLE_H
      );

      const pageWidth = Math.floor(SINGLE_W * scale);
      const pageHeight = Math.floor(SINGLE_H * scale);

      for (const src of images) {
        const isSingle = singlePages.includes(src);
        const imgEl = await loadImage(src);

        if (isSingle) {
          const div = document.createElement('div');
          div.classList.add('page');
          div.style.width = pageWidth + 'px';
          div.style.height = pageHeight + 'px';
          const img = document.createElement('img');
          img.src = src;
          div.appendChild(img);
          container.appendChild(div);
        } else {
          for (const side of ['left', 'right']) {
            const canvas = document.createElement('canvas');
            canvas.width = imgEl.naturalWidth / 2;
            canvas.height = imgEl.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imgEl, side === 'left' ? 0 : imgEl.naturalWidth / 2, 0, imgEl.naturalWidth / 2, imgEl.naturalHeight, 0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#888';
            if (side === 'left') {
              ctx.fillRect(canvas.width - 3, 0, 3, canvas.height);
            } else {
              ctx.fillRect(0, 0, 3, canvas.height);
            }

            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/jpeg', 1.0);

            const div = document.createElement('div');
            div.classList.add('page');
            div.style.width = pageWidth + 'px';
            div.style.height = pageHeight + 'px';
            div.appendChild(img);
            container.appendChild(div);
          }
        }
      }

      const pageFlip = new St.PageFlip(document.getElementById('flipbook'), {
        width: pageWidth,
        height: pageHeight,
        showCover: true,
        mobileScrollSupport: false,
        useMouseEvents: true,
        drawShadow: true,
        flippingTime: 800,
        autoSize: false,
        usePortrait: false,
        startPage: 0,
      });

      pageFlip.loadFromHTML(document.querySelectorAll('.page'));

      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('flipbook').style.display = 'block';
      }, 3000);
    }

    init();
  </script>
</body>
</html>
